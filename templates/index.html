<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Phishing URL Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: #0a0e27;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ANIMATED PARTICLES BACKGROUND */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, #00d4ff, #0900ff);
            animation: float 20s infinite linear;
            opacity: 0.6;
            box-shadow: 0 0 20px #00d4ff;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1); }
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
            width: 100%;
            max-width: 550px;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.3);
            animation: glow 3s ease-in-out infinite alternate;
            z-index: 1;
        }

        @keyframes glow {
            from { box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3); }
            to { box-shadow: 0 8px 50px rgba(0, 212, 255, 0.6); }
        }

        h1 { 
            color: #00d4ff; 
            margin-bottom: 25px; 
            font-size: 28px; 
            text-shadow: 0 0 10px #00d4ff;
        }

        input[type="text"] {
            width: 100%; padding: 14px; 
            border: 2px solid #00d4ff;
            border-radius: 10px; font-size: 15px; margin-bottom: 15px; 
            outline: none; background: rgba(0,0,0,0.3); color: white;
        }
        input::placeholder { color: #aaa; }

        button {
            background: linear-gradient(135deg, #00d4ff, #0900ff);
            color: white; border: none; padding: 14px 35px; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 212, 255, 0.8); }

        .result { margin-top: 25px; padding: 20px; border-radius: 10px; background: rgba(0,0,0,0.3); }
        .safe { color: #00ff88; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px #00ff88; }
        .suspicious { color: #ff0044; font-weight: bold; font-size: 18px; text-shadow: 0 0 10px #ff0044; }
    </style>
</head>
<body>
    <div id="particles"></div>
    
    <div class="container">
        <h1>🛡️ Pro Phishing URL Checker</h1>
        <form method="POST">
            <input type="text" name="url" placeholder="Enter URL here - example: https://google.com" required>
            <button type="submit">Scan URL</button>
        </form>

        {% if result %}
        <div class="result">
            <h3 style="color:white;">Result for: {{ url }}</h3>
            <p style="color:white;"><b>Domain Age:</b> {{ domain_age }}</p>
            {% if 'SAFE' in result %}
                <p class="safe">✅ {{ result }}</p>
            {% else %}
                <p class="suspicious">⚠️ {{ result }}</p>
            {% endif %}
        </div>
        {% endif %}
    </div>

<script>
    const particlesContainer = document.getElementById('particles');
    for(let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        particle.style.left = Math.random() * 100 + 'vw';
        particle.style.width = particle.style.height = Math.random() * 10 + 5 + 'px';
        particle.style.animationDelay = Math.random() * 20 + 's';
        particle.style.animationDuration = Math.random() * 10 + 15 + 's';
        particlesContainer.appendChild(particle);
    }
</script>
</body>
</html>
