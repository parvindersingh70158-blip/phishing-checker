
<!DOCTYPE html>
<html>
<head>
    <title>Pro Phishing URL Checker</title>
    <style>
        body { font-family: Arial; background: #f4f4f4; text-align: center; padding: 50px; }
       .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc; max-width: 600px; margin: auto; }
        input { width: 80%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
       .safe { color: green; font-weight: bold; font-size: 18px; }
       .danger { color: red; font-weight: bold; font-size: 18px; }
        ul { text-align: left; display: inline-block; margin-top: 10px; }
        h1 { color: #333; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛡️ Pro Phishing URL Checker</h1>
    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL here - example: https://google.com" required>
        <br>
        <button type="submit">Scan URL</button>
    </form>
    
    {% if result %}
    <h2>Result for: {{ url }}</h2>
    <p><b>Domain Age:</b> {{ domain_age }}</p>
    {% if result.safe %}
        <p class="safe">✅ This URL looks SAFE</p>
    {% else %}
        <p class="danger">⚠️ This URL looks SUSPICIOUS</p>
        <ul>
        {% for issue in result.issues %}
            <li>{{ issue }}</li>
        {% endfor %}
        </ul>
    {% endif %}
    {% endif %}
</div>
</body>
</html>
